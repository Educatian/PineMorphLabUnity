<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0b151a">
    <link rel="icon" href="data:,">
    <title>PineMorph Lab | WebGL Simulator</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #e7eceb;
        color: #172327;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-width: 320px;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
        background: #e7eceb;
      }

      #app-shell {
        width: min(1600px, calc(100vw - 32px), calc((100vh - 64px) * 16 / 9));
      }

      #web-header {
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        background: #0b151a;
        color: #f4f7f6;
        border-radius: 6px 6px 0 0;
      }

      #brand {
        font-size: 15px;
        font-weight: 700;
      }

      #brand span {
        margin-left: 12px;
        color: #83d7ca;
        font-size: 11px;
        font-weight: 600;
      }

      #fullscreen-button {
        min-width: 92px;
        height: 32px;
        border: 1px solid #4f7075;
        border-radius: 4px;
        background: #14262c;
        color: #f4f7f6;
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
      }

      #fullscreen-button:hover,
      #fullscreen-button:focus-visible {
        border-color: #39b9a7;
        outline: 2px solid #39b9a7;
        outline-offset: 2px;
      }

      #unity-frame {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        background: #eef1ef;
        border: 1px solid #273c42;
        border-top: 0;
        border-radius: 0 0 6px 6px;
      }

      #unity-canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: {{{ BACKGROUND_COLOR }}};
      }

      #unity-loading-bar {
        position: absolute;
        inset: 0;
        display: grid;
        place-content: center;
        gap: 14px;
        background: #0b151a;
        color: #f4f7f6;
        text-align: center;
      }

      #loading-title {
        font-size: 18px;
        font-weight: 700;
      }

      #unity-progress-bar-empty {
        width: min(360px, 58vw);
        height: 8px;
        overflow: hidden;
        background: #294047;
        border-radius: 4px;
      }

      #unity-progress-bar-full {
        width: 0;
        height: 100%;
        background: #248f83;
      }

      #loading-status {
        color: #a9bbbe;
        font-size: 12px;
      }

      #unity-warning {
        position: absolute;
        top: 12px;
        left: 50%;
        width: min(720px, calc(100% - 24px));
        transform: translateX(-50%);
        display: none;
        z-index: 4;
      }

      #mobile-blocker {
        display: none;
        width: min(360px, calc(100vw - 32px));
        padding: 28px 24px;
        border: 1px solid #9fb1b3;
        border-radius: 6px;
        background: #f7f8f5;
      }

      #mobile-blocker h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      #mobile-blocker p {
        margin: 0;
        color: #425458;
        font-size: 16px;
        line-height: 1.5;
      }

      @media (max-width: 1099px) {
        body {
          overflow: auto;
        }

        #app-shell {
          display: none;
        }

        #mobile-blocker {
          display: block;
        }
      }

      html.unsupported-device body {
        overflow: auto;
      }

      html.unsupported-device #app-shell {
        display: none;
      }

      html.unsupported-device #mobile-blocker {
        display: block;
      }
    </style>
  </head>
  <body>
    <main id="app-shell">
      <header id="web-header">
        <div id="brand">ADIE LAB <span>DESKTOP SIMULATION</span></div>
        <button id="fullscreen-button" type="button">Fullscreen</button>
      </header>
      <div id="unity-frame">
        <canvas id="unity-canvas" width="1600" height="900" tabindex="0"
          aria-label="Interactive PineMorph Lab simulation"></canvas>
        <div id="unity-loading-bar" role="status" aria-live="polite">
          <div id="loading-title">Loading PineMorph Lab</div>
          <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
          </div>
          <div id="loading-status">Preparing hygromorph mechanics...</div>
        </div>
        <div id="unity-warning"></div>
      </div>
    </main>

    <section id="mobile-blocker">
      <h1>PineMorph Lab</h1>
      <p>This simulation requires a desktop or laptop browser with a mouse or trackpad. Open this link on a larger screen to run the lab.</p>
    </section>

    <script>
      var isUnsupportedDevice = window.matchMedia("(max-width: 1099px)").matches
        || /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      if (isUnsupportedDevice) {
        document.documentElement.classList.add("unsupported-device");
      }
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBar = document.querySelector("#unity-progress-bar-full");
      var loadingStatus = document.querySelector("#loading-status");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(message, type) {
        var item = document.createElement("div");
        item.textContent = message;
        item.style.padding = "10px 14px";
        item.style.background = type === "error" ? "#b42318" : "#f5b942";
        item.style.color = type === "error" ? "#ffffff" : "#1b2528";
        warningBanner.appendChild(item);
        warningBanner.style.display = "block";
        if (type !== "error") {
          window.setTimeout(function () {
            item.remove();
            warningBanner.style.display = warningBanner.children.length ? "block" : "none";
          }, 5000);
        }
      }

      if (!isUnsupportedDevice) {
        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
        var config = {
          arguments: [],
          dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
          frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
#if USE_THREADS
          workerUrl: buildUrl + "/{{{ WORKER_FILENAME }}}",
#endif
#if USE_WASM
          codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
          symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
          streamingAssetsUrl: "StreamingAssets",
          companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
          productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
          productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
          showBanner: unityShowBanner,
          autoSyncPersistentDataPath: true
        };

        var loaderScript = document.createElement("script");
        loaderScript.src = loaderUrl;
        loaderScript.onload = function () {
          createUnityInstance(canvas, config, function (progress) {
            var percent = Math.round(progress * 100);
            progressBar.style.width = percent + "%";
            loadingStatus.textContent = "Loading " + percent + "%";
          }).then(function (unityInstance) {
            window.pineMorphUnity = unityInstance;
            loadingBar.style.display = "none";
            document.querySelector("#fullscreen-button").onclick = function () {
              unityInstance.SetFullscreen(1);
            };
            canvas.focus();
          }).catch(function (message) {
            unityShowBanner(message, "error");
          });
        };
        document.body.appendChild(loaderScript);
      }
    </script>
  </body>
</html>
